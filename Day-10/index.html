<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day-10</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="pricing">
    <h1 class="pricing-title">Choose Your Plan</h1>
    <p class="pricing-subtitle">Simple pricing, no hidden fees</p>

    <div class="pricing-grid">

      <div class="plan plan-basic">
        <span class="plan-badge plan-basic">Basic</span>
        <h2 class="plan-price">$9<span>/mo</span></h2>
        <ul class="plan-features">
          <li>5 Projects</li>
          <li>10GB Storage</li>
          <li>Email Support</li>
        </ul>
        <button class="plan-btn">Get Started</button>
      </div>

      <div class="plan plan-pro">
        <span class="plan-badge plan-medium">Most Popular</span>
        <h2 class="plan-price">$19<span>/mo</span></h2>
        <ul class="plan-features">
          <li>20 Projects</li>
          <li>50GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button class="plan-btn">Get Started</button>
      </div>

      <div class="plan plan-premium">
        <span class="plan-badge plan-premium">Premium</span>
        <h2 class="plan-price">$29<span>/mo</span></h2>
        <ul class="plan-features">
          <li>Unlimited Projects</li>
          <li>500GB Storage</li>
          <li>24/7 Dedicated Support</li>
        </ul>
        <button class="plan-btn">Get Started</button>
      </div>

    </div>
  </section>

</body>

</html>
